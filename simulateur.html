/* ── Simulateur styles ── */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A5C;--blue:#2E75B6;--accent:#D4740B;
  --light-blue:#D6E4F0;--pale-blue:#EBF2F9;--green:#2D8B55;
  --text:#333333;--text-light:#6B7280;--text-muted:#9CA3AF;
  --bg:#FFFFFF;--bg-alt:#F8FAFC;--border:#E5E7EB;
  --navy-10:rgba(27,58,92,0.08);--blue-10:rgba(46,117,182,0.08);
  --accent-10:rgba(212,116,11,0.08);--green-10:rgba(45,139,85,0.08);
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow-sm:0 1px 2px rgba(27,58,92,0.06);
  --shadow-md:0 4px 12px rgba(27,58,92,0.08);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Source Sans 3',system-ui,sans-serif;color:var(--text);background:#F1F5F9;min-height:100vh;margin:0;padding:0}
.app{width:100%;max-width:680px;margin:0 auto;padding:2rem 1rem}

/* Header */
.header{text-align:center;margin-bottom:2rem}
.header-sub{font-family:'Montserrat',sans-serif;font-size:13px;color:var(--blue);font-weight:500;letter-spacing:0.5px;margin-bottom:1rem}
.header h1{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--navy);line-height:1.3}
.header p.desc{font-size:14px;color:var(--text-light);margin-top:6px;line-height:1.5}

/* Progress */
.progress{display:flex;align-items:center;gap:0;margin-bottom:2rem;padding:0 1rem}
.prog-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.prog-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;border:2px solid var(--border);color:var(--text-muted);background:var(--bg);position:relative;z-index:1;transition:.3s}
.prog-step.active .prog-num{border-color:var(--blue);color:var(--bg);background:var(--blue)}
.prog-step.done .prog-num{border-color:var(--green);color:var(--bg);background:var(--green)}
.prog-label{font-size:11px;color:var(--text-muted);margin-top:6px;font-weight:500;text-align:center;transition:.3s}
.prog-step.active .prog-label{color:var(--blue);font-weight:600}
.prog-step.done .prog-label{color:var(--green)}
.prog-line{flex:1;height:2px;background:var(--border);margin:0 -8px;margin-top:-22px;position:relative;z-index:0;transition:.3s}
.prog-line.done{background:var(--green)}

/* Card */
.card{background:var(--bg);border-radius:var(--radius-xl);box-shadow:var(--shadow-md);padding:2rem;border:1px solid rgba(27,58,92,0.06)}
.card h2{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:600;color:var(--navy);margin-bottom:2px}
.card .step-desc{font-size:13px;color:var(--text-light);margin-bottom:1.5rem;line-height:1.5}

/* Form */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px}
.field select,.field input[type=number],.field input[type=text]{
  height:42px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:'Source Sans 3',system-ui,sans-serif;font-size:14px;color:var(--text);
  background:var(--bg);transition:.2s;outline:none;width:100%
}
.field select:focus,.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-10)}
.field input[type=number]{-moz-appearance:textfield}
.field input::-webkit-inner-spin-button{-webkit-appearance:none}
.field .hint{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Chips */
.chip-label{font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text);transition:.2s;
  user-select:none
}
.chip:hover{border-color:var(--blue);background:var(--pale-blue)}
.chip.sel{border-color:var(--blue);background:var(--light-blue);color:var(--navy);font-weight:600}
.chip.parcours{padding:10px 20px;border-radius:var(--radius);font-family:'Montserrat',sans-serif;font-size:13px}
.chip.parcours.sel{background:var(--navy);color:#fff;border-color:var(--navy)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif}
.badge-bleu{background:#DBEAFE;color:#1E40AF}
.badge-jaune{background:#FEF3C7;color:#92400E}
.badge-violet{background:#EDE9FE;color:#5B21B6}
.badge-rose{background:#FCE7F3;color:#9D174D}

/* Alerts */
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;line-height:1.5;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.alert svg{flex-shrink:0;margin-top:1px}
.alert-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.alert-info{background:var(--pale-blue);border:1px solid var(--light-blue);color:var(--navy)}

/* Navigation */
.nav-row{display:flex;gap:10px;margin-top:1.5rem}
.btn{
  flex:1;height:44px;border-radius:var(--radius);font-family:'Montserrat',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:6px
}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#244B73}
.btn-secondary{background:transparent;color:var(--navy);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--pale-blue);border-color:var(--light-blue)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#BD6709}

/* Results */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.result-card{background:var(--bg-alt);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--border)}
.result-card .rc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted)}
.result-card .rc-value{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;margin-top:4px}
.result-card .rc-sub{font-size:12px;color:var(--text-light);margin-top:2px}
.rc-mpr{color:var(--blue)}
.rc-cee{color:var(--green)}
.rc-ptz{color:var(--navy)}
.rc-rac{color:var(--accent)}

/* Bar chart */
.bar-section{margin:16px 0}
.bar-title{font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.bar-wrap{height:32px;background:var(--bg-alt);border-radius:var(--radius);overflow:hidden;display:flex;border:1px solid var(--border)}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;transition:.4s;min-width:3px}
.bar-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12px;color:var(--text-light)}
.bar-legend span{display:flex;align-items:center;gap:5px}
.bar-legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Detail table */
.detail-section{margin-top:16px}
.detail-table{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;font-size:14px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-row:nth-child(even){background:var(--bg-alt)}
.detail-row .dlbl{color:var(--text-light)}
.detail-row .dval{font-weight:600;font-family:'Montserrat',sans-serif;font-size:13px}
.detail-row.total{background:var(--navy);color:#fff}
.detail-row.total .dlbl,.detail-row.total .dval{color:#fff}

/* CTA */
.cta-box{margin-top:1.5rem;padding:20px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--pale-blue) 0%,#fff 100%);border:1.5px solid var(--light-blue)}
.cta-box h3{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.cta-box p{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:12px}
.cta-btn{
  display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:var(--radius);
  background:var(--accent);color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;
  font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:.2s
}
.cta-btn:hover{background:#BD6709;transform:translateY(-1px)}

/* Disclaimer */
.disclaimer{font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:16px;padding:12px 16px;background:var(--bg-alt);border-radius:var(--radius);border:1px solid var(--border)}

/* Footer */
.footer{text-align:center;margin-top:2rem;padding-bottom:1rem}
.footer .brand{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:var(--navy);letter-spacing:1px}
.footer .contact{font-size:12px;color:var(--text-muted);margin-top:4px}
.footer a{color:var(--blue);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:480px){
  .form-row.cols-2{grid-template-columns:1fr}
  .result-grid{grid-template-columns:1fr}
  .card{padding:1.25rem}
  .progress{padding:0}
  .prog-label{font-size:10px}
}

</style>

const AMPLEUR = {
  bleu:{2:{taux:80,plafond:30000},3:{taux:80,plafond:40000}},
  jaune:{2:{taux:60,plafond:30000},3:{taux:60,plafond:40000}},
  violet:{2:{taux:45,plafond:30000},3:{taux:45,plafond:40000}},
  rose:{2:{taux:10,plafond:30000},3:{taux:10,plafond:40000}}
};
const ECRETEMENT_GESTE = {bleu:90, jaune:75, violet:60, rose:40};
const ECRETEMENT_ACCOMP = {bleu:100, jaune:90, violet:80, rose:50};
const PLAFOND_GESTE_5ANS = 20000;
const STEP_TITLES = ['Situation','Logement','Travaux','Résultats'];

function getCouleur() {
  const p = S.loc === 'idf' ? PLAFONDS_IDF : PLAFONDS_HDF;
  const extra = S.loc === 'idf' ? EXTRA_IDF : EXTRA_HDF;
  const n = Math.min(Math.max(S.menage, 1), 5);
  const seuils = p[n];
  const rfr = parseInt(S.rfr) || 0;
  let bonus = 0;
  if (S.menage > 5) bonus = (S.menage - 5) * extra[0];
  for (let i = 0; i < 4; i++) {
    const extraI = S.menage > 5 ? (S.menage - 5) * extra[i] : 0;
    if (rfr <= seuils[i] + extraI) return i;
  }
  return 3;
}

function fmt(n) { return Math.round(n).toLocaleString('fr-FR') + ' \u20AC' }

function calcGeste() {
  const ci = getCouleur();
  const key = ['bleu','jaune','violet','rose'][ci];
  let mpr = 0, ceeMin = 0, ceeMax = 0;
  const alerts = [];
  S.travaux.forEach(t => {
    const g = GESTES[t];
    if (!g) return;
    mpr += g[key] || 0;
    ceeMin += g.cee[0];
    ceeMax += g.cee[1];
  });
  if (ci === 3 && S.travaux.length > 0) alerts.push('Les m\u00E9nages Rose sont exclus du parcours monogeste. Orientez-vous vers la r\u00E9novation d\u2019ampleur.');
  if (S.travaux.includes('vmc_df') && !S.travaux.some(t => t.startsWith('isolation')))
    alerts.push('VMC double flux : conditionn\u00E9e \u00E0 un geste d\u2019isolation simultan\u00E9 depuis 2026.');
  if (mpr > PLAFOND_GESTE_5ANS)
    alerts.push('Plafond monogeste : le cumul MPR ne peut d\u00E9passer ' + fmt(PLAFOND_GESTE_5ANS) + ' par logement sur 5 ans. Montant \u00E9cr\u00EAt\u00E9.');
  mpr = Math.min(mpr, PLAFOND_GESTE_5ANS);
  const budget = parseInt(S.budget) || 0;
  const tvaEco = Math.round(budget * 0.145);
  const nbGestes = S.travaux.length;
  const ecoPtzMax = nbGestes >= 3 ? 50000 : nbGestes >= 2 ? 25000 : 15000;
  const ecoPtz = Math.min(budget > 0 ? budget : ecoPtzMax, ecoPtzMax);
  const ceeMoy = Math.round((ceeMin + ceeMax) / 2);
  const totalAides = mpr + ceeMoy;
  const ecretTaux = ECRETEMENT_GESTE[key];
  const ecret = Math.round(budget * ecretTaux / 100);
  const aidesFinales = budget > 0 ? Math.min(totalAides, ecret) : totalAides;
  const rac = budget > 0 ? Math.max(budget - aidesFinales, 0) : 0;
  return { ci, mpr, ceeMin, ceeMax, ceeMoy, tvaEco, ecoPtz, totalAides, aidesFinales, rac, alerts, budget, ecret, ecretTaux, cumulCee: true };
}

function calcAmpleur() {
  const ci = getCouleur();
  const key = ['bleu','jaune','violet','rose'][ci];
  const saut = (S.dpe === 'F' || S.dpe === 'G') ? 3 : 2;
  const a = AMPLEUR[key][saut];
  const budget = parseInt(S.budget) || 0;
  const depElg = Math.min(budget, a.plafond);
  const mpr = Math.round(depElg * a.taux / 100);
  const ceeMin = 0;
  const ceeMax = 0;
  const ceeMoy = 0;
  const tvaEco = Math.round(budget * 0.145);
  const ecoPtz = Math.min(budget, 50000);
  const totalAides = mpr;
  const ecretTaux = ECRETEMENT_ACCOMP[key];
  const ecret = Math.round(budget * ecretTaux / 100);
  const aidesFinales = budget > 0 ? Math.min(totalAides, ecret) : totalAides;
  const rac = budget > 0 ? Math.max(budget - aidesFinales, 0) : 0;
  const alerts = [];
  if (ci === 3) alerts.push('M\u00E9nages Rose : taux r\u00E9duit \u00E0 10% en r\u00E9novation d\u2019ampleur (2026).');
  if (S.dpe === 'inconnu') alerts.push('DPE non renseign\u00E9 : simulation bas\u00E9e sur un saut de 2 classes. Un DPE F/G donnerait acc\u00E8s au plafond 40 000 \u20AC.');
  if (S.dpe !== 'inconnu' && !['E','F','G'].includes(S.dpe))
    alerts.push('Depuis 2026, le parcours accompagn\u00E9 est r\u00E9serv\u00E9 aux logements class\u00E9s E, F ou G au DPE.');
  alerts.push('Parcours accompagn\u00E9 : MaPrimeR\u00E9nov\u2019 n\u2019est PAS cumulable avec les CEE. Seules les aides locales et l\u2019\u00E9co-PTZ restent cumulables.');
  return { ci, mpr, ceeMin, ceeMax, ceeMoy, tvaEco, ecoPtz, totalAides, aidesFinales, rac, alerts, budget, ecret, ecretTaux, saut, taux: a.taux, plafond: a.plafond, cumulCee: false };
}

  </div>`;

  h += `<div class="disclaimer">\u26A0\uFE0F Cette simulation est indicative et ne constitue pas un engagement. Les montants d\u00E9finitifs d\u00E9pendent des devis d\u2019artisans RGE, du DPE r\u00E9alis\u00E9 par un diagnostiqueur certifi\u00E9, et de la validation par l\u2019Anah. Sources : bar\u00E8mes Anah 2026 (arr\u00EAt\u00E9 du 29/12/2025), plafonds revaloris\u00E9s. Les CEE sont estim\u00E9s en fourchette (variable selon op\u00E9rateur). Aides locales (R\u00E9gion, D\u00E9partement) non int\u00E9gr\u00E9es. Mise \u00E0 jour avril 2026.</div>`;

  h += `<div class="nav-row"><button class="btn btn-secondary" onclick="S.step=0;render()">\u2190 Nouvelle simulation</button><button class="btn btn-secondary" onclick="prev()">Modifier</button></div></div>`;
  return h;
}

function render() {
  const a = document.getElementById('app');
  let h = renderHeader() + renderProgress();
  if (S.step === 0) h += renderStep0();
  else if (S.step === 1) h += renderStep1();
  else if (S.step === 2) h += renderStep2();
  else if (S.step === 3) h += renderStep3();
  h += `<div class="footer"><div class="brand">ADORA \u2014 \u00C9conomiste de la construction</div><div class="contact">06 60 21 55 09 \u00B7 <a href="mailto:aymericdussauze@gmail.com">aymericdussauze@gmail.com</a> \u00B7 <a href="https://adora-economie.fr" target="_blank">adora-economie.fr</a></div></div>`;
  a.innerHTML = h;
  bindInputs();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function bindInputs() {
  const b = (id, key, parser) => { const el = document.getElementById(id); if (el) el.addEventListener('change', e => { S[key] = parser ? parser(e.target.value) : e.target.value; }); };
  b('loc','loc'); b('menage','menage',Number); b('rfr','rfr');
  b('logType','logType'); b('logAge','logAge'); b('dpe','dpe'); b('statut','statut');
  b('budget','budget');
}

function toggleTrav(k) {
  const i = S.travaux.indexOf(k);
  if (i >= 0) S.travaux.splice(i, 1); else S.travaux.push(k);
  render();
}

function next() { if (S.step < 3) S.step++; render(); }
function prev() { if (S.step > 0) S.step--; render(); }

render();
</script>

}
