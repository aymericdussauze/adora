name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://aymericdussauze.github.io/adora-staging/
            https://aymericdussauze.github.io/adora-staging/estimateur.html
            https://aymericdussauze.github.io/adora-staging/sur-mesure.html
          budgetPath: './.github/workflows/lighthouse-budget.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
